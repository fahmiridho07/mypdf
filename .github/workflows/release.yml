name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-python@v5
        if: matrix.os == 'windows-latest'
        with:
          python-version: "3.11"

      - name: Bundle the Python runtime (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: ./scripts/prepare-python.ps1

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "MyPDF __VERSION__"
          releaseBody: >
            Windows builds ship with everything included. On Linux and macOS,
            install Python 3.10+ with `pip install pymupdf pikepdf pillow`.
            Optional per feature tools are listed in the README.


            Windows SmartScreen may warn about an unrecognized app because the
            installer is not code signed. Click "More info" then "Run anyway".
            Every release is built in public from this repository by GitHub Actions.
          releaseDraft: false

  winget:
    needs: build
    runs-on: windows-latest
    # harmless while the initial package submission is still in moderation
    continue-on-error: true
    steps:
      - name: Submit version update to winget-pkgs
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $url = "https://github.com/fahmiridho07/mypdf/releases/download/${{ github.ref_name }}/MyPDF_${version}_x64-setup.exe"
          Invoke-WebRequest https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
          .\wingetcreate.exe update FahmiRidho.MyPDF --version $version --urls $url --submit --token "${{ secrets.WINGET_TOKEN }}"
