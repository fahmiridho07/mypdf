name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "MyPDF __VERSION__"
          releaseBody: >
            Download the setup exe below (or the MSI if you prefer).
            Requirements and optional per feature tools are listed in the README.


            Windows SmartScreen may warn about an unrecognized app because the
            installer is not code signed. Click "More info" then "Run anyway".
            Every release is built in public from this repository by GitHub Actions.
          releaseDraft: false

  winget:
    needs: build-windows
    runs-on: windows-latest
    steps:
      - name: Submit version update to winget-pkgs
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $url = "https://github.com/fahmiridho07/mypdf/releases/download/${{ github.ref_name }}/MyPDF_${version}_x64-setup.exe"
          Invoke-WebRequest https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
          .\wingetcreate.exe update FahmiRidho.MyPDF --version $version --urls $url --submit --token "${{ secrets.WINGET_TOKEN }}"
